<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BudgetScan 💸</title>
<!-- React 17 + ReactDOM 17 (compatibles con CDN global) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
<!-- Chart.js en lugar de Recharts (más estable en CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useEffect, useRef, useCallback } = React;

const CATS = ["Supermercado","Farmacia","Restaurante","Transporte","Entretenimiento","Ropa","Hogar","Salud","Educación","Servicios","Otros"];
const COLORS = ["#6366f1","#f59e0b","#10b981","#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f43f5e","#84cc16","#0ea5e9","#a78bfa"];
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const DEF_BUDGETS = {Supermercado:150000,Farmacia:30000,Restaurante:50000,Transporte:40000,Entretenimiento:30000,Ropa:40000,Hogar:50000,Salud:30000,Educación:20000,Servicios:60000,Otros:20000};
const fmt = n => new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(n||0);
const ld = (k,d) => { try{ return JSON.parse(localStorage.getItem(k)||JSON.stringify(d)) }catch{ return d } };

async function scanReceipt(base64, mimeType) {
  const r = await fetch("/api/scan", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({base64, mimeType, date: new Date().toISOString().split("T")[0]})
  });
  if(!r.ok) throw new Error(await r.text()||"Error "+r.status);
  return r.json();
}

// ── Chart.js wrapper ──
function BarChartJS({data, labels, datasets, horizontal=false}) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    if(!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: "bar",
      data: { labels, datasets },
      options: {
        indexAxis: horizontal?"y":"x",
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{labels:{color:"#94a3b8",font:{size:12}}},
          tooltip:{callbacks:{label:ctx=>" "+fmt(ctx.parsed[horizontal?"x":"y"])}} },
        scales:{
          x:{ticks:{color:"#64748b",font:{size:11},callback:v=>horizontal?fmt(v):(v>0?`$${(v/1000).toFixed(0)}k`:0)},grid:{color:"#1e293b"}},
          y:{ticks:{color:"#64748b",font:{size:11},callback:v=>!horizontal&&v>0?`$${(v/1000).toFixed(0)}k`:v},grid:{color:"#1e293b"}}
        }
      }
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify({labels,datasets,horizontal})]);
  return e("canvas",{ref,style:{width:"100%"}});
}

function PieChartJS({data}) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    if(!ref.current||!data.length) return;
    chartRef.current = new Chart(ref.current, {
      type:"doughnut",
      data:{ labels:data.map(d=>d.name), datasets:[{data:data.map(d=>d.value),backgroundColor:data.map(d=>d.color),borderWidth:2,borderColor:"#0f172a"}] },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:"right",labels:{color:"#94a3b8",font:{size:11},boxWidth:12}},
          tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.parsed)}`}}}
      }
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(data)]);
  return e("canvas",{ref,style:{width:"100%"}});
}

// ── helpers ──
const div  = (style,...ch) => e("div",{style},...ch);
const span = (style,...ch) => e("span",{style},...ch);
const card = (style,...ch) => div({background:"#1e293b",borderRadius:12,padding:16,marginBottom:12,...style},...ch);
const btn  = (label,onClick,bg="#6366f1",extra={}) =>
  e("button",{onClick,style:{background:bg,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13,...extra}},label);

// ══════════════════════════════════════
function App() {
  const [tab,setTab]             = useState("dashboard");
  const [expenses,setExpenses]   = useState(()=>ld("bs_exp",[]));
  const [budgets,setBudgets]     = useState(()=>ld("bs_bud",DEF_BUDGETS));
  const [scanning,setScanning]   = useState(false);
  const [scanResult,setScanResult] = useState(null);
  const [scanError,setScanError] = useState("");
  const [editBudget,setEditBudget] = useState(false);
  const fileRef = useRef();

  useEffect(()=>localStorage.setItem("bs_exp",JSON.stringify(expenses)),[expenses]);
  useEffect(()=>localStorage.setItem("bs_bud",JSON.stringify(budgets)),[budgets]);

  const now=new Date(), cm=now.getMonth(), cy=now.getFullYear();
  const dim=new Date(cy,cm+1,0).getDate(), dom=now.getDate();

  const getMonth=(m,y)=>expenses.filter(ex=>{ const d=new Date(ex.date); return d.getMonth()===m&&d.getFullYear()===y; });
  const mExps=getMonth(cm,cy);
  const byCat={};
  mExps.forEach(ex=>ex.items.forEach(it=>{ byCat[it.category]=(byCat[it.category]||0)+it.amount; }));
  const mTotal=Object.values(byCat).reduce((a,b)=>a+b,0);
  const bTotal=Object.values(budgets).reduce((a,b)=>a+b,0);
  const daily=dom>0?mTotal/dom:0, projM=daily*dim;
  const ytd=expenses.reduce((s,ex)=>{ const d=new Date(ex.date); return d.getFullYear()===cy?s+ex.items.reduce((ss,i)=>ss+i.amount,0):s; },0);
  const projY=ytd/(cm+(dom/dim))*12;

  const alerts=CATS.flatMap(cat=>{
    const spent=byCat[cat]||0, budget=budgets[cat]||0;
    if(!budget) return [];
    const pct=spent/budget;
    if(pct>=1)    return [{cat,type:"danger", msg:`${cat}: AGOTADO (${Math.round(pct*100)}%)`}];
    if(pct>=0.85) return [{cat,type:"warning",msg:`${cat}: Cerca del límite (${Math.round(pct*100)}%)`}];
    return [];
  });

  const catData=CATS.map((cat,i)=>({
    cat, spent:byCat[cat]||0, budget:budgets[cat]||0, color:COLORS[i],
    deviation:(byCat[cat]||0)-(budgets[cat]||0),
    pct:budgets[cat]?Math.min(((byCat[cat]||0)/budgets[cat])*100,150):0
  })).filter(c=>c.spent>0||c.budget>0);

  const monthly=MONTHS.map((mes,i)=>{
    const ex=getMonth(i,cy);
    return {mes, gasto:ex.reduce((s,x)=>s+x.items.reduce((ss,it)=>ss+it.amount,0),0)};
  });

  const pieData=CATS.map((cat,i)=>({name:cat,value:byCat[cat]||0,color:COLORS[i]})).filter(d=>d.value>0);

  const handleFile=async ev=>{
    const file=ev.target.files[0]; if(!file) return;
    setScanning(true); setScanResult(null); setScanError("");
    const reader=new FileReader();
    reader.onload=async re=>{
      try{ setScanResult(await scanReceipt(re.target.result.split(",")[1],file.type)); }
      catch(err){ setScanError(err.message); }
      setScanning(false);
    };
    reader.readAsDataURL(file); ev.target.value="";
  };

  const confirmReceipt=()=>{
    if(!scanResult) return;
    setExpenses(p=>[...p,{id:Date.now(),...scanResult}]);
    setScanResult(null); setTab("dashboard");
  };

  const ttStyle={background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0"};
  const TABS=[{id:"dashboard",label:"📊 Dashboard"},{id:"scan",label:"📷 Escanear"},{id:"history",label:"📋 Historial"},{id:"budget",label:"💰 Presupuesto"},{id:"evolution",label:"📈 Evolución"}];

  // ── DASHBOARD ──
  const renderDashboard=()=>div({},
    div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:16},
      ...[
        {label:"Gasto MTD",value:fmt(mTotal),sub:`${Math.round(bTotal?mTotal/bTotal*100:0)}% del presupuesto`,color:"#6366f1"},
        {label:"Proyección Mes",value:fmt(projM),sub:projM>bTotal?"⚠️ Sobre presupuesto":"✅ En presupuesto",color:projM>bTotal?"#ef4444":"#10b981"},
        {label:"Presupuesto Mes",value:fmt(bTotal),sub:`Saldo: ${fmt(bTotal-mTotal)}`,color:"#f59e0b"},
        {label:"Proyección Anual",value:fmt(projY||0),sub:`Día ${dom}/${dim} de ${MONTHS[cm]}`,color:"#8b5cf6"},
      ].map((k,i)=>div({key:i,background:"#1e293b",borderRadius:12,padding:16,borderLeft:`4px solid ${k.color}`},
        div({fontSize:11,color:"#64748b",marginBottom:4},k.label),
        div({fontSize:18,fontWeight:700},k.value),
        div({fontSize:11,color:"#94a3b8",marginTop:2},k.sub)
      ))
    ),
    alerts.length>0&&card({},
      div({fontSize:14,color:"#f59e0b",fontWeight:600,marginBottom:10},"🚨 Alertas"),
      div({display:"flex",flexWrap:"wrap",gap:8},
        ...alerts.map((a,i)=>div({key:i,
          background:a.type==="danger"?"rgba(239,68,68,0.15)":"rgba(245,158,11,0.15)",
          border:`1px solid ${a.type==="danger"?"#ef4444":"#f59e0b"}`,
          padding:"6px 12px",borderRadius:8,fontSize:12},
          (a.type==="danger"?"🔴 ":"🟡 ")+a.msg))
      )
    ),
    card({},
      div({display:"flex",justifyContent:"space-between",marginBottom:8},
        span({fontSize:13,fontWeight:600},`Avance mensual — Día ${dom}/${dim}`),
        span({fontSize:12,color:"#94a3b8"},`${fmt(daily)}/día`)
      ),
      div({background:"#0f172a",borderRadius:8,height:12,overflow:"hidden"},
        div({width:`${Math.min(bTotal?mTotal/bTotal*100:0,100)}%`,height:"100%",
          background:`linear-gradient(90deg,#6366f1,${mTotal>bTotal?"#ef4444":"#10b981"})`,transition:"width .5s"})
      ),
      div({display:"flex",justifyContent:"space-between",marginTop:4,fontSize:11,color:"#64748b"},
        e("span",{},"Gastado: "+fmt(mTotal)),e("span",{},"Presupuesto: "+fmt(bTotal))
      )
    ),
    card({},
      div({fontSize:14,fontWeight:600,marginBottom:14},"Categorías vs Presupuesto"),
      catData.length===0
        ?div({color:"#64748b",fontSize:13,textAlign:"center",padding:20},"Sube tu primera boleta para ver datos aquí 👆")
        :div({},...catData.map((c,i)=>div({key:i,marginBottom:12},
            div({display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3},
              span({color:c.color,fontWeight:600},c.cat),
              span({color:c.deviation>0?"#ef4444":"#10b981"},`${fmt(c.spent)} / ${fmt(c.budget)} (${c.deviation>0?"+":""}${fmt(c.deviation)})`)
            ),
            div({background:"#0f172a",borderRadius:6,height:8,overflow:"hidden"},
              div({width:`${Math.min(c.pct,100)}%`,height:"100%",background:c.pct>=100?"#ef4444":c.pct>=85?"#f59e0b":c.color})
            )
          )))
    ),
    pieData.length>0&&card({},
      div({fontSize:14,fontWeight:600,marginBottom:12},"Distribución del mes"),
      div({height:220},e(PieChartJS,{data:pieData}))
    )
  );

  // ── SCAN ──
  const renderScan=()=>div({},
    card({textAlign:"center",padding:32},
      div({fontSize:56,marginBottom:12},"📷"),
      div({fontSize:18,fontWeight:700,marginBottom:8},"Escanear Boleta"),
      div({color:"#64748b",fontSize:13,marginBottom:20},"Sube una foto y la IA clasificará todos los gastos automáticamente"),
      btn("📁 Seleccionar imagen",()=>fileRef.current.click(),"linear-gradient(135deg,#6366f1,#8b5cf6)",{padding:"12px 28px",fontSize:15}),
      e("input",{ref:fileRef,type:"file",accept:"image/*",onChange:handleFile,style:{display:"none"}}),
      div({fontSize:11,color:"#475569",marginTop:12},"Soporta JPG, PNG, WEBP, HEIC")
    ),
    scanning&&card({textAlign:"center",padding:32},
      div({fontSize:36,marginBottom:12},"⏳"),
      div({color:"#a5b4fc",fontWeight:600,fontSize:16},"Analizando boleta con IA..."),
      div({color:"#64748b",fontSize:12,marginTop:4},"Identificando ítems y clasificando gastos")
    ),
    scanError&&card({background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444"},
      div({color:"#fca5a5",fontWeight:600,marginBottom:4},"❌ Error al procesar"),
      div({color:"#94a3b8",fontSize:12},scanError),
      div({color:"#64748b",fontSize:12,marginTop:8},"Verifica que la función Netlify esté activa y ANTHROPIC_API_KEY configurada.")
    ),
    scanResult&&card({},
      div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},
        div({},div({fontSize:16,fontWeight:600},scanResult.store||"Comercio"),div({fontSize:12,color:"#64748b",marginTop:2},scanResult.date)),
        div({fontSize:22,fontWeight:700,color:"#6366f1"},fmt(scanResult.total))
      ),
      ...(scanResult.items||[]).map((it,i)=>div({key:i,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0f172a"},
        div({},div({fontSize:13},it.name),e("span",{style:{fontSize:11,background:"#312e81",color:"#a5b4fc",padding:"2px 8px",borderRadius:10}},it.category)),
        div({fontWeight:600},fmt(it.amount))
      )),
      div({display:"flex",gap:10,marginTop:14},
        btn("✅ Confirmar",confirmReceipt,"#10b981",{flex:1}),
        btn("❌ Cancelar",()=>setScanResult(null),"#ef4444",{flex:1})
      )
    )
  );

  // ── HISTORY ──
  const renderHistory=()=>div({},
    div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},
      div({fontSize:16,fontWeight:700},"Historial"),
      span({color:"#64748b",fontSize:13},expenses.length+" registros")
    ),
    expenses.length===0
      ?div({textAlign:"center",padding:40,color:"#64748b"},div({fontSize:48},"🧾"),div({marginTop:8},"Sin boletas aún"))
      :div({},...[...expenses].reverse().map(ex=>card({key:ex.id},
          div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8},
            div({},div({fontWeight:600,fontSize:14},ex.store||"Comercio"),div({fontSize:11,color:"#64748b"},ex.date)),
            div({display:"flex",alignItems:"center",gap:10},
              span({fontWeight:700,color:"#6366f1"},fmt(ex.total)),
              e("button",{onClick:()=>setExpenses(p=>p.filter(x=>x.id!==ex.id)),
                style:{background:"#7f1d1d",border:"none",color:"#fca5a5",padding:"4px 8px",borderRadius:6,cursor:"pointer",fontSize:12}},"🗑️")
            )
          ),
          div({display:"flex",flexWrap:"wrap",gap:4},
            ...(ex.items||[]).map((it,j)=>e("span",{key:j,style:{fontSize:11,background:"#0f172a",padding:"3px 8px",borderRadius:8,color:"#94a3b8"}},`${it.name}: ${fmt(it.amount)}`))
          )
        )))
  );

  // ── BUDGET ──
  const renderBudget=()=>div({},
    div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},
      div({fontSize:16,fontWeight:700},"Presupuesto Mensual"),
      btn(editBudget?"✅ Guardar":"✏️ Editar",()=>setEditBudget(!editBudget),editBudget?"#10b981":"#6366f1")
    ),
    ...CATS.map((cat,i)=>card({key:cat,display:"flex",justifyContent:"space-between",alignItems:"center"},
      div({display:"flex",alignItems:"center",gap:10},
        div({width:10,height:10,borderRadius:"50%",background:COLORS[i],flexShrink:0}),
        e("span",{style:{fontSize:14}},cat)
      ),
      editBudget
        ?e("input",{type:"number",value:budgets[cat]||0,onChange:ev=>setBudgets(p=>({...p,[cat]:+ev.target.value})),
            style:{background:"#0f172a",border:"1px solid #334155",color:"white",padding:"6px 12px",borderRadius:8,width:140,textAlign:"right",fontSize:14}})
        :div({textAlign:"right"},
            div({fontWeight:600},fmt(budgets[cat]||0)),
            div({fontSize:11,color:(byCat[cat]||0)>(budgets[cat]||0)?"#ef4444":"#10b981"},"Gastado: "+fmt(byCat[cat]||0))
          )
    )),
    card({background:"linear-gradient(135deg,#1e293b,#1e1b4b)",display:"flex",justifyContent:"space-between",alignItems:"center"},
      div({fontWeight:700},"Total Mensual"),
      div({fontWeight:700,color:"#6366f1",fontSize:20},fmt(bTotal))
    )
  );

  // ── EVOLUTION ──
  const renderEvolution=()=>div({},
    card({},
      div({fontSize:14,fontWeight:600,marginBottom:14},"Evolución Mensual "+cy),
      div({height:230},e(BarChartJS,{
        labels:monthly.map(m=>m.mes),
        datasets:[
          {label:"Gasto",data:monthly.map(m=>m.gasto),backgroundColor:"#6366f1",borderRadius:4},
          {label:"Presupuesto",data:monthly.map(()=>bTotal),backgroundColor:"#334155",borderRadius:4}
        ]
      }))
    ),
    card({},
      div({fontSize:14,fontWeight:600,marginBottom:12},"Proyecciones"),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
        ...[
          {label:"Proyección fin de mes",value:fmt(projM),sub:projM>bTotal?`⚠️ +${fmt(projM-bTotal)} sobre ppto`:`✅ ${fmt(bTotal-projM)} de saldo`,color:projM>bTotal?"#ef4444":"#10b981"},
          {label:"Proyección anual",value:fmt(projY||0),sub:`Presupuesto anual: ${fmt(bTotal*12)}`,color:"#8b5cf6"},
        ].map((k,i)=>div({key:i,background:"#0f172a",borderRadius:10,padding:14,textAlign:"center"},
          div({fontSize:11,color:"#64748b",marginBottom:6},k.label),
          div({fontSize:18,fontWeight:700,color:k.color},k.value),
          div({fontSize:11,color:"#94a3b8",marginTop:4},k.sub)
        ))
      )
    ),
    catData.length>0&&card({},
      div({fontSize:14,fontWeight:600,marginBottom:14},"Gastado vs Presupuesto por Categoría"),
      div({height:Math.max(catData.length*40,220)},e(BarChartJS,{
        horizontal:true,
        labels:catData.map(c=>c.cat),
        datasets:[
          {label:"Gastado",data:catData.map(c=>c.spent),backgroundColor:"#6366f1",borderRadius:4},
          {label:"Presupuesto",data:catData.map(c=>c.budget),backgroundColor:"#334155",borderRadius:4}
        ]
      }))
    )
  );

  const renderTab=()=>{
    if(tab==="dashboard") return renderDashboard();
    if(tab==="scan")      return renderScan();
    if(tab==="history")   return renderHistory();
    if(tab==="budget")    return renderBudget();
    if(tab==="evolution") return renderEvolution();
  };

  return e("div",{style:{minHeight:"100vh"}},
    div({background:"linear-gradient(135deg,#1e1b4b,#312e81)",padding:"16px 20px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,.5)"},...[
      div({maxWidth:900,margin:"0 auto"},
        div({display:"flex",justifyContent:"space-between",alignItems:"center"},
          div({},
            div({fontSize:22,fontWeight:700,color:"#a5b4fc"},"💸 BudgetScan"),
            div({fontSize:11,color:"#818cf8"},"Control inteligente de gastos")
          ),
          div({display:"flex",gap:6,flexWrap:"wrap"},
            ...alerts.slice(0,2).map((a,i)=>div({key:i,
              background:a.type==="danger"?"#7f1d1d":"#78350f",
              padding:"4px 8px",borderRadius:8,fontSize:11,
              color:a.type==="danger"?"#fca5a5":"#fcd34d"},"⚠️ "+a.cat))
          )
        ),
        div({display:"flex",gap:4,marginTop:12,overflowX:"auto",paddingBottom:4},
          ...TABS.map(t=>e("button",{key:t.id,onClick:()=>setTab(t.id),style:{
            padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,whiteSpace:"nowrap",
            fontWeight:tab===t.id?700:400,background:tab===t.id?"#6366f1":"transparent",color:tab===t.id?"white":"#94a3b8"
          }},t.label))
        )
      )
    ]),
    div({padding:20,maxWidth:900,margin:"0 auto"},renderTab())
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
